<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#6C63FF" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ICFES Quiz" />
  <meta name="description" content="Simulador ICFES con inteligencia artificial. Practica todas las áreas del examen." />
  <title>Simulador ICFES</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0F0F1A;
      --surface: #1A1A2E;
      --surface2: #22223A;
      --border: #2E2E4A;
      --text: #E8E8F5;
      --muted: #888899;
      --accent: #6C63FF;
      --green: #00D68F;
      --red: #FF4D6D;
      --yellow: #FFB830;
      --radius: 16px;
      --font-head: 'Sora', sans-serif;
      --font-body: 'IBM Plex Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      overflow-x: hidden;
    }

    /* ── SPLASH / HOME ── */
    #screen-home {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: 0 0 2rem;
    }

    .home-hero {
      background: linear-gradient(135deg, #1A1A2E 0%, #0F0F1A 60%);
      padding: 3rem 1.5rem 2rem;
      position: relative;
      overflow: hidden;
    }
    .home-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 0%, #6C63FF22 0%, transparent 60%),
                  radial-gradient(ellipse at 20% 100%, #00D68F11 0%, transparent 60%);
    }
    .home-hero-inner { position: relative; }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #6C63FF22;
      border: 1px solid #6C63FF44;
      border-radius: 100px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 600;
      color: #a09dff;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .home-title {
      font-family: var(--font-head);
      font-size: 32px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff 30%, #a09dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .home-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    .home-stats-row {
      display: flex;
      gap: 12px;
      padding: 1.2rem 1.5rem;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .home-stats-row::-webkit-scrollbar { display: none; }

    .stat-pill {
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 16px;
      text-align: center;
      min-width: 80px;
    }
    .stat-pill-val {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-pill-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 1.5rem;
      margin-bottom: 12px;
    }

    .topics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 1.5rem;
    }

    .topic-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      -webkit-user-select: none;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .topic-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .topic-card:active { transform: scale(0.97); }

    .topic-icon { font-size: 24px; line-height: 1; }
    .topic-name {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }
    .topic-count { font-size: 11px; color: var(--muted); }

    /* ── QUIZ SCREEN ── */
    #screen-quiz {
      display: none;
      flex-direction: column;
      min-height: 100dvh;
    }

    .quiz-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 1rem 1.2rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .back-btn {
      width: 36px; height: 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      color: var(--text);
    }

    .quiz-header-topic { flex: 1; }
    .quiz-header-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      font-family: var(--font-head);
    }
    .quiz-header-sub { font-size: 11px; color: var(--muted); }

    .quiz-stats {
      display: flex;
      gap: 6px;
    }
    .q-stat {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      font-family: var(--font-head);
      text-align: center;
    }

    .accuracy-bar {
      height: 3px;
      background: var(--surface2);
    }
    .accuracy-fill {
      height: 100%;
      background: var(--green);
      transition: width 0.5s ease;
    }

    .quiz-body { flex: 1; padding: 1.2rem; display: flex; flex-direction: column; gap: 16px; }

    .subtopic-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      align-self: flex-start;
    }

    .question-num {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .question-text {
      font-family: var(--font-head);
      font-size: 17px;
      font-weight: 600;
      line-height: 1.55;
      color: var(--text);
    }

    .options-list { display: flex; flex-direction: column; gap: 10px; }

    .option-btn {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      -webkit-user-select: none;
      user-select: none;
      width: 100%;
    }
    .option-btn:active:not(:disabled) { transform: scale(0.98); }
    .option-btn:disabled { cursor: default; }

    .option-btn.state-default:not(:disabled):active {
      border-color: var(--accent);
      background: #6C63FF11;
    }

    .option-btn.state-correct {
      background: #00D68F11;
      border-color: var(--green);
    }
    .option-btn.state-wrong {
      background: #FF4D6D11;
      border-color: var(--red);
    }
    .option-btn.state-dimmed {
      opacity: 0.45;
    }

    .option-label {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-family: var(--font-head);
      transition: background 0.2s;
    }
    .state-correct .option-label { background: var(--green); }
    .state-wrong .option-label { background: var(--red); }
    .state-dimmed .option-label { background: var(--border); }

    .option-text {
      font-size: 14px;
      line-height: 1.55;
      color: var(--text);
      padding-top: 4px;
      flex: 1;
    }
    .state-dimmed .option-text { color: var(--muted); }

    .option-icon { font-size: 18px; flex-shrink: 0; align-self: center; }

    /* Explanation */
    .explanation-box {
      border-radius: 14px;
      padding: 16px;
      border: 1.5px solid;
    }
    .explanation-box.correct {
      background: #00D68F0D;
      border-color: #00D68F33;
    }
    .explanation-box.wrong {
      background: #FF4D6D0D;
      border-color: #FF4D6D33;
    }
    .expl-header {
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .explanation-box.correct .expl-header { color: var(--green); }
    .explanation-box.wrong .expl-header { color: var(--red); }
    .expl-text { font-size: 13px; line-height: 1.65; color: var(--muted); }

    /* Actions */
    .quiz-actions { display: flex; gap: 10px; }
    .btn-next {
      flex: 1;
      padding: 15px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-next:active { transform: scale(0.97); opacity: 0.9; }

    .btn-regen {
      width: 52px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-size: 20px;
      cursor: pointer;
      transition: transform 0.15s;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
    }
    .btn-regen:active { transform: scale(0.95); }

    /* Loading */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      gap: 16px;
    }
    .loader {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--muted); font-family: var(--font-head); }

    /* Error */
    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 2rem;
      gap: 12px;
      text-align: center;
    }
    .error-icon { font-size: 40px; }
    .error-text { font-size: 14px; color: var(--muted); line-height: 1.6; }
    .btn-retry {
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 24px;
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    /* hint */
    .hint-text {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      padding-bottom: 1rem;
    }

    /* topic scroll bar in quiz */
    .topic-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 1.2rem;
      scrollbar-width: none;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .topic-scroll::-webkit-scrollbar { display: none; }
    .topic-chip {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
      font-family: var(--font-head);
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all 0.15s;
      background: var(--surface2);
      color: var(--muted);
    }
    .topic-chip.active { color: #fff; }
  </style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="screen-home">
  <div class="home-hero">
    <div class="home-hero-inner">
      <div class="hero-badge">⚡ IA Generativa</div>
      <h1 class="home-title">Simulador<br>ICFES</h1>
      <p class="home-sub">Preguntas únicas generadas por inteligencia artificial. Todas las áreas del examen.</p>
    </div>
  </div>

  <div class="home-stats-row">
    <div class="stat-pill">
      <div class="stat-pill-val">10</div>
      <div class="stat-pill-label">Áreas</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-val">∞</div>
      <div class="stat-pill-label">Preguntas</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-val">IA</div>
      <div class="stat-pill-label">Powered</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-val">100%</div>
      <div class="stat-pill-label">Gratis</div>
    </div>
  </div>

  <div class="section-label" style="margin-top:8px">Elige un área</div>
  <div class="topics-grid" id="topics-grid"></div>
</div>

<!-- QUIZ SCREEN -->
<div id="screen-quiz">
  <div class="quiz-header">
    <button class="back-btn" id="back-btn">←</button>
    <div class="quiz-header-topic">
      <div class="quiz-header-label" id="hdr-topic">—</div>
      <div class="quiz-header-sub" id="hdr-sub">—</div>
    </div>
    <div class="quiz-stats">
      <div class="q-stat" id="stat-correct" style="color:var(--green)">✓ 0</div>
      <div class="q-stat" id="stat-wrong" style="color:var(--red)">✗ 0</div>
    </div>
  </div>

  <div class="accuracy-bar"><div class="accuracy-fill" id="acc-fill" style="width:0%"></div></div>

  <div class="topic-scroll" id="topic-scroll"></div>

  <div class="quiz-body" id="quiz-body">
    <div class="loading-state">
      <div class="loader"></div>
      <div class="loading-text">Generando pregunta…</div>
    </div>
  </div>
</div>

<script>
const TOPICS = [
  { id:"lectura",    label:"Lectura Crítica",   icon:"📖", color:"#7C73FF" },
  { id:"matematicas",label:"Matemáticas",        icon:"📐", color:"#E8445A" },
  { id:"ciencias",   label:"Ciencias Naturales", icon:"🔬", color:"#00D68F" },
  { id:"sociales",   label:"Ciencias Sociales",  icon:"🌍", color:"#FFB830" },
  { id:"ingles",     label:"Inglés",             icon:"🇬🇧", color:"#2196F3" },
  { id:"fisica",     label:"Física",             icon:"⚛️", color:"#C671FF" },
  { id:"quimica",    label:"Química",            icon:"🧪", color:"#FF5722" },
  { id:"biologia",   label:"Biología",           icon:"🧬", color:"#4CAF50" },
  { id:"competencias",label:"Comp. Ciudadanas",  icon:"⚖️", color:"#78909C" },
  { id:"filosofia",  label:"Filosofía",          icon:"🏛️", color:"#A1887F" },
];

const SUBTOPICS = {
  lectura:["Comprensión lectora","Análisis de textos","Inferencias","Argumentación","Textos discontinuos"],
  matematicas:["Álgebra","Geometría","Estadística","Probabilidad","Trigonometría","Aritmética","Cálculo básico"],
  ciencias:["Ecosistemas","Célula y genética","Evolución","Fuerza y movimiento","Energía","Reacciones químicas"],
  sociales:["Historia de Colombia","Historia Mundial","Geografía","Economía","Política","Constitución"],
  ingles:["Grammar","Vocabulary","Reading comprehension","Verb tenses","Connectors"],
  fisica:["Mecánica","Termodinámica","Electromagnetismo","Óptica","Ondas y sonido"],
  quimica:["Tabla periódica","Enlace químico","Estequiometría","Soluciones","Cinética química"],
  biologia:["Genética y herencia","Evolución","Metabolismo celular","Reproducción","Sistema nervioso"],
  competencias:["Derechos humanos","Participación democrática","Convivencia","Pluralidad","Identidad"],
  filosofia:["Ética","Epistemología","Lógica","Filosofía antigua","Filosofía moderna"],
};

let state = {
  topic: null,
  qNum: 1,
  stats: { correct: 0, wrong: 0, total: 0 },
  subtopic: "",
  questionData: null,
  answered: false,
};

// Build home grid
const grid = document.getElementById("topics-grid");
TOPICS.forEach(t => {
  const card = document.createElement("button");
  card.className = "topic-card";
  card.innerHTML = `<span class="topic-icon">${t.icon}</span><span class="topic-name">${t.label}</span><span class="topic-count">Subtemas: ${SUBTOPICS[t.id].length}</span>`;
  card.style.borderColor = t.color + "44";
  card.addEventListener("click", () => startQuiz(t.id));
  grid.appendChild(card);
});

// Build quiz topic scroll
const scroll = document.getElementById("topic-scroll");
TOPICS.forEach(t => {
  const chip = document.createElement("button");
  chip.className = "topic-chip";
  chip.id = `chip-${t.id}`;
  chip.textContent = `${t.icon} ${t.label.split(" ")[0]}`;
  chip.addEventListener("click", () => changeTopic(t.id));
  scroll.appendChild(chip);
});

document.getElementById("back-btn").addEventListener("click", goHome);

function goHome() {
  document.getElementById("screen-home").style.display = "";
  document.getElementById("screen-quiz").style.display = "none";
}

function startQuiz(topicId) {
  state.topic = topicId;
  state.qNum = 1;
  state.stats = { correct: 0, wrong: 0, total: 0 };
  document.getElementById("screen-home").style.display = "none";
  document.getElementById("screen-quiz").style.display = "flex";
  updateHeader();
  fetchQuestion();
}

function changeTopic(topicId) {
  state.topic = topicId;
  updateHeader();
  fetchQuestion();
}

function updateHeader() {
  const t = TOPICS.find(x => x.id === state.topic);
  document.getElementById("hdr-topic").textContent = t ? `${t.icon} ${t.label}` : "—";
  document.getElementById("hdr-sub").textContent = state.subtopic || "—";
  // chips
  TOPICS.forEach(x => {
    const chip = document.getElementById(`chip-${x.id}`);
    if (!chip) return;
    if (x.id === state.topic) {
      chip.classList.add("active");
      chip.style.background = x.color;
      chip.style.borderColor = x.color;
      chip.scrollIntoView({ inline:"center", behavior:"smooth" });
    } else {
      chip.classList.remove("active");
      chip.style.background = "";
      chip.style.borderColor = "transparent";
    }
  });
  updateStats();
}

function updateStats() {
  const { correct, wrong, total } = state.stats;
  document.getElementById("stat-correct").textContent = `✓ ${correct}`;
  document.getElementById("stat-wrong").textContent = `✗ ${wrong}`;
  const acc = total > 0 ? Math.round((correct / total) * 100) : 0;
  document.getElementById("acc-fill").style.width = acc + "%";
  document.getElementById("acc-fill").style.background = acc >= 70 ? "var(--green)" : "var(--red)";
}

async function fetchQuestion() {
  const topicId = state.topic;
  const subs = SUBTOPICS[topicId] || ["General"];
  const sub = subs[Math.floor(Math.random() * subs.length)];
  state.subtopic = sub;
  state.answered = false;
  state.questionData = null;
  document.getElementById("hdr-sub").textContent = sub;

  renderLoading();

  const t = TOPICS.find(x => x.id === topicId);
  const prompt = `Eres un experto en el examen ICFES colombiano. Genera UNA pregunta de opción múltiple de nivel ICFES sobre el tema: ${t?.label || topicId} - subtema: ${sub}.

La pregunta debe:
- Ser del nivel de dificultad real del ICFES
- Tener exactamente 4 opciones: A, B, C, D
- Solo una opción correcta
- Incluir una breve explicación de la respuesta correcta (máximo 3 oraciones)

Responde ÚNICAMENTE en este formato JSON exacto, sin texto extra, sin markdown:
{"pregunta":"texto de la pregunta","opciones":{"A":"opción A","B":"opción B","C":"opción C","D":"opción D"},"correcta":"A","explicacion":"explicación de por qué la respuesta es correcta"}

Pregunta número ${state.qNum}. Varía el nivel de dificultad y el enfoque.`;

  try {
    const GEMINI_KEY = "AIzaSyBLqjdo_8q-kmap1sGFuh83uOfqbNAPdas";
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-14:generateContent`, {
      method: "POST",
      headers: { 
        "Content-Type": "application/json",
        "x-goog-api-key": GEMINI_KEY
      },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { 
          temperature: 0.9, 
          maxOutputTokens: 8192,
          thinkingConfig: { thinkingBudget: 0 }
        }
      }),
    });
    const data = await res.json();
    console.log("API response:", JSON.stringify(data));
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
    const clean = text.replace(/```json|```/g, "").trim();
    console.log("Parsed text:", clean);
    state.questionData = JSON.parse(clean);
    renderQuestion();
  } catch(e) {
    console.error("Fetch error:", e);
    renderError();
  }
}

function renderLoading() {
  document.getElementById("quiz-body").innerHTML = `
    <div class="loading-state">
      <div class="loader"></div>
      <div class="loading-text">Generando pregunta #${state.qNum}…</div>
    </div>`;
}

function renderError() {
  const body = document.getElementById("quiz-body");
  body.innerHTML = `
    <div class="error-state">
      <div class="error-icon">⚠️</div>
      <div class="error-text">No se pudo generar la pregunta.<br>Verifica tu conexión e intenta de nuevo.</div>
      <button class="btn-retry" id="retry-btn">Reintentar</button>
    </div>`;
  document.getElementById("retry-btn").addEventListener("click", fetchQuestion);
}

function renderQuestion() {
  const q = state.questionData;
  const t = TOPICS.find(x => x.id === state.topic);
  const body = document.getElementById("quiz-body");

  body.innerHTML = `
    <div class="subtopic-chip">📌 ${state.subtopic}</div>
    <div class="question-num">Pregunta #${state.qNum}</div>
    <div class="question-text">${q.pregunta}</div>
    <div class="options-list" id="options-list"></div>
    <div id="feedback-area"></div>
    <div id="actions-area"></div>
    <div class="hint-text" id="hint">Selecciona una opción para responder</div>
  `;

  const list = document.getElementById("options-list");
  Object.entries(q.opciones).forEach(([key, text]) => {
    const btn = document.createElement("button");
    btn.className = "option-btn state-default";
    btn.innerHTML = `<span class="option-label">${key}</span><span class="option-text">${text}</span>`;
    btn.addEventListener("click", () => handleAnswer(key));
    list.appendChild(btn);
  });
}

function handleAnswer(chosen) {
  if (state.answered) return;
  state.answered = true;
  const q = state.questionData;
  const correct = q.correcta;
  const isRight = chosen === correct;

  state.stats.total++;
  if (isRight) state.stats.correct++; else state.stats.wrong++;
  updateStats();

  // Style options
  const btns = document.querySelectorAll(".option-btn");
  btns.forEach(btn => {
    const key = btn.querySelector(".option-label").textContent;
    btn.disabled = true;
    if (key === correct) {
      btn.classList.replace("state-default","state-correct");
      btn.innerHTML += `<span class="option-icon">✅</span>`;
    } else if (key === chosen && !isRight) {
      btn.classList.replace("state-default","state-wrong");
      btn.innerHTML += `<span class="option-icon">❌</span>`;
    } else {
      btn.classList.replace("state-default","state-dimmed");
    }
  });

  // Feedback
  const fb = document.getElementById("feedback-area");
  fb.innerHTML = `
    <div class="explanation-box ${isRight ? 'correct' : 'wrong'}">
      <div class="expl-header">${isRight ? '🎉 ¡Correcto!' : `❌ Incorrecto — Respuesta: ${correct}`}</div>
      <div class="expl-text">💡 <strong>Explicación:</strong> ${q.explicacion}</div>
    </div>`;

  document.getElementById("hint").style.display = "none";

  // Actions
  const t = TOPICS.find(x => x.id === state.topic);
  const act = document.getElementById("actions-area");
  act.innerHTML = `<div class="quiz-actions">
    <button class="btn-next" id="next-btn" style="background:${t?.color || 'var(--accent)'}">Siguiente pregunta →</button>
    <button class="btn-regen" id="regen-btn" title="Regenerar">🔄</button>
  </div>`;
  document.getElementById("next-btn").addEventListener("click", () => { state.qNum++; fetchQuestion(); });
  document.getElementById("regen-btn").addEventListener("click", fetchQuestion);
}

// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
